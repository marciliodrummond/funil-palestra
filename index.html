  // Exit intent popup
  useEffect(() => {
    let lastY = 0;
    let lastTime = 0;
    const handleMouseLeave = (e) => {
      if (e.clientY < 5 && !popupFired.current && window.scrollY > 400) {
        popupFired.current = true;
        setShowPopup(true);
      }
    };
    const handleScroll = () => {
      const now = Date.now();
      const currentY = window.scrollY;
      if (lastTime && now - lastTime < 300 && lastY - currentY > 80 && currentY > 400 && !popupFired.current) {
        popupFired.current = true;
        setShowPopup(true);
      }
      lastY = currentY;
      lastTime = now;
    };
    const handleVisChange = () => {
      if (document.hidden && window.scrollY > 400 && !popupFired.current) {
        popupFired.current = true;
        setShowPopup(true);
      }
    };
    document.addEventListener("mouseleave", handleMouseLeave);
    window.addEventListener("scroll", handleScroll);
    document.addEventListener("visibilitychange", handleVisChange);
    return () => {
      document.removeEventListener("mouseleave", handleMouseLeave);
      window.removeEventListener("scroll", handleScroll);
      document.removeEventListener("visibilitychange", handleVisChange);
    };
  }, []);

  const t = useMemo(() => getThemeStyles(dark), [dark]);

  const renderInline = (text) => {
    if (!text) return text;
    const parts = [];
    let remaining = text;
    let keyI = 0;
    const regex = /(\*\*(.+?)\*\*)|(\*(.+?)\*)|(`(.+?)`)|(\[(.+?)\]\((.+?)\))/g;
    let lastIndex = 0;
    let match;
    while ((match = regex.exec(remaining)) !== null) {
      if (match.index > lastIndex) parts.push(remaining.slice(lastIndex, match.index));
      if (match[1]) parts.push(<strong key={keyI++} style={{ color: t.fgPrimary, fontWeight: 600 }}>{match[2]}</strong>);
      else if (match[3]) parts.push(<em key={keyI++} style={{ color: t.fgSecondary, fontStyle: "italic" }}>{match[4]}</em>);
      else if (match[5]) parts.push(<code key={keyI++} style={{ background: t.bgAccentSubtle, color: t.fgAccent, padding: "1px 6px", borderRadius: 4, fontFamily: "'JetBrains Mono', monospace", fontSize: "0.85em" }}>{match[6]}</code>);
      else if (match[7]) parts.push(<a key={keyI++} href={match[9]} target="_blank" rel="noopener noreferrer" style={{ color: t.fgAccent, textDecoration: "underline" }}>{match[8]}</a>);
      lastIndex = match.index + match[0].length;
    }
    if (lastIndex < remaining.length) parts.push(remaining.slice(lastIndex));
    return parts;

    while (i < lines.length) {
      const line = lines[i];
      if (line.trim() === "") { i++; continue; }
      // Heading
      if (/^\*\*.+\*\*:?$/.test(line.trim()) || /^\*\*.+:\*\*/.test(line.trim())) {
        blocks.push(<h4 key={i} style={{ color: t.fgAccent, fontFamily: "'Sora', sans-serif", fontWeight: 600, fontSize: "0.95rem", marginTop: 16, marginBottom: 6 }}>{renderInline(line.replace(/\*\*/g, ""))}</h4>);
        i++; continue;
      }
      // Bullet list
      if (line.trim().startsWith("- ")) {
        const items = [];
        while (i < lines.length && lines[i].trim().startsWith("- ")) {
          items.push(lines[i].trim().slice(2));
          i++;
        }
        blocks.push(
          <ul key={`ul-${i}`} style={{ margin: "8px 0", paddingLeft: 0, listStyle: "none" }}>
            {items.map((item, j) => (
              <li key={j} style={{ display: "flex", gap: 8, marginBottom: 5, color: t.fgSecondary, fontSize: "0.9rem", lineHeight: 1.6 }}>
                <span style={{ color: t.fgAccent, flexShrink: 0, marginTop: 2 }}>•</span>
                <span>{renderInline(item)}</span>
              </li>
            ))}
          </ul>
        );
        continue;
      }
      // Numbered list
      if (/^\d+\./.test(line.trim())) {
        const items = [];
        while (i < lines.length && /^\d+\./.test(lines[i].trim())) {
          items.push(lines[i].trim().replace(/^\d+\.\s*/, ""));
          i++;
        }
        blocks.push(
          <ol key={`ol-${i}`} style={{ margin: "8px 0", paddingLeft: 0, listStyle: "none", counterReset: "item" }}>
            {items.map((item, j) => (
              <li key={j} style={{ display: "flex", gap: 8, marginBottom: 5, color: t.fgSecondary, fontSize: "0.9rem", lineHeight: 1.6 }}>
                <span style={{ color: t.fgAccent, fontFamily: "'JetBrains Mono', monospace", fontSize: "0.8rem", fontWeight: 600, flexShrink: 0, marginTop: 2 }}>{j + 1}.</span>
                <span>{renderInline(item)}</span>
              </li>
            ))}
          </ol>
        );
        continue;
      }
      // Paragraph
      blocks.push(<p key={i} style={{ color: t.fgSecondary, fontSize: "0.9rem", lineHeight: 1.7, margin: "6px 0" }}>{renderInline(line)}</p>);
      i++;
    }
    return blocks;
  };
