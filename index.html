f,smartphone:y1,"external-link":Zp,eye:tf,terminal:z1,"alert-triangle":T1,"check-circle":$u,copy:Vp,users:Xu,"layout-grid":kf,database:$p,mail:zf,"mouse-pointer":Uf,bot:xp,sparkles:k1,target:Yu,"scroll-text":s1,"arrow-right-left":dp,cpu:Hp,package:Wf,phone:Jf,sliders:h1,layout:Gf,"message-circle":Nf,upload:N1,handshake:pf,play:e1,mic:Ff,video:D1,award:hp,megaphone:Tf,map:jf,"list-checks":wf,clipboard:Dp,repeat:n1,"pie-chart":Np,"dollar-sign":Kp,"user-check":L1,"arrow-right":fp,check:Qu,info:hf},Va=({name:C,size:D=18,className:g=""})=>{const re=U1[C]||Wa;return u.jsx(re,{size:D,className:g})},Qe=[{id:"visao-geral",title:"Visão Geral",description:"Entenda o método FPSI e por que ele funciona",icon:"rocket",cards:[{title:"O Que É o Funil de Palestra Super Inteligente",subtitle:"Um motor previsível de agenda cheia com leads qualificados",level:"iniciante",icon:"lightbulb",analogy:{tag:"Analogia Central",text:"O FPSI é como uma **máquina de café expresso profissional**. Cada etapa do funil é uma engrenagem: se uma peça falha, o café não sai. Mas quando todas funcionam juntas, cada palestra produz uma xícara perfeita de clientes qualificados — de forma repetível e previsível."},content:`O Funil de Palestra Super Inteligente (FPSI) é um **sistema completo de 11 etapas** que transforma uma palestra educativa em uma máquina de geração de clientes qualificados.

**Diferente de funis tradicionais**, o FPSI não depende de disparos frios ou grupos genéricos. Ele usa o poder da **autoridade ao vivo** para criar confiança instantânea e converter audiência em agenda cheia.

**As 11 Etapas do Funil:**

- **01. Pesquisa** — Identificação do público e problema específico
- **02. Posicionamento** — Definição da proposta de valor
- **03. Tema e Promessa** — Título com benefício mensurável
- **04. Oferta** — Estruturação pré e pós-palestra
- **05. Ativos** — LP, formulário, WhatsApp, slides
- **06. Captação** — Orgânico + pago + parcerias
- **07. Inscrição** — Cadastro e qualificação
- **08. Aquecimento** — Preparação pré-evento
- **09. Entrega** — A palestra em si
- **10. CTA Inteligente** — Chamada estratégica
- **11. Pós-evento** — Agendamentos → Follow-up → Conversão → Onboarding → Encantamento → Indicações`,tips:["O FPSI funciona tanto para serviços jurídicos quanto para consultorias, mentorias, agências e profissionais liberais","Uma palestra quinzenal bem rodada = agenda cheia por 7-10 dias","O sistema é repetível: depois da primeira vez, cada rodada fica mais eficiente","Comece pelo Modo Sprint 72h se tiver pouco tempo"]},{title:"Os 5 Pilares do FPSI",subtitle:"Fundamentos que sustentam todo o sistema",level:"iniciante",icon:"layers",content:`O FPSI se apoia em **5 pilares** que garantem consistência e resultados:

**1. Clareza** — Público e problema específico. Sem clareza, tudo é genérico e nada converte. Você precisa saber exatamente quem está na sala e qual dor cara você resolve.

**2. Valor** — Conteúdo aplicável imediato. A audiência sai da palestra com ações concretas que pode implementar amanhã. Isso constrói confiança e cria urgência pela solução completa.

**3. Mecânica de Decisão** — CTA + prova + redução de risco. Não basta entregar conteúdo; é preciso facilitar a tomada de decisão com chamadas estratégicas, provas sociais éticas e eliminação de objeções.

**4. Rotina** — Processo repetível. O FPSI não é um evento único. É um sistema operacional que você roda quinzenalmente com playbooks, checklists e templates.

**5. Métrica** — Otimização contínua. Se não mede, não melhora. O sistema tem KPIs claros (show-up, agendamentos, conversão) que guiam cada ajuste.`,tips:["Foque primeiro em Clareza e Valor — são a base de tudo","A Mecânica de Decisão é o que diferencia uma palestra educativa de uma que gera clientes","Rotina vence talento: um processo médio rodado toda semana supera um evento perfeito rodado uma vez","Métricas simples bastam no início: inscritos, presentes, agendamentos, contratos"]},{title:"Funil de Palestra vs. Funil de WhatsApp",subtitle:"Por que a palestra supera disparos em grupo",level:"iniciante",icon:"arrow-right-left",content:`A comparação direta mostra por que o FPSI é superior ao modelo de WhatsApp puro:

**Funil de Palestra:**
- Autoridade construída em 45-60 min (prova + método ao vivo)
- Qualificação ao vivo via checklist/quiz
- Engajamento real-time (Q&A, QR codes, botões)
- Escala: 100 pessoas na sala = 100 conversas iniciadas de uma vez
- Conversão de contexto: conteúdo + diagnóstico imediato → agenda cheia
- Compliance: termo de inscrição + consentimento LGPD + conteúdo educativo
- CAC menor: um investimento traz dezenas de reuniões

**Funil de WhatsApp Puro:**
- Disparos frios que soam como venda direta
- Leads genéricos em grupos sem qualificação
- Leitura superficial de mensagens
- Conversas 1:1 demoradas e de baixa conversão
- Precisa insistir individualmente para cada lead
- Menor autoridade inicial
- Maior esforço por conversão

**O ideal é combinar ambos:** a palestra gera autoridade e qualificação, o WhatsApp faz o follow-up e aquecimento.`,tips:["Use o WhatsApp como canal de suporte ao funil, não como canal principal","O grupo de WhatsApp da palestra deve ser silencioso — só você posta avisos","Após a palestra, o WhatsApp ganha poder porque já há contexto e confiança","Mensure CAC dos dois canais e compare: você vai se surpreender"]},{title:"Quando Usar o Funil de Palestra",subtitle:"Cenários ideais e exemplos por setor",level:"iniciante",icon:"target",content:`O FPSI funciona melhor quando:

**Ticket consultivo** — O serviço começa com diagnóstico e evolui para proposta. Exemplos: holding familiar, LGPD, trabalhista preventivo, contratos complexos, regulatório, franquias, licitações, M&A, bancário 360°, consultoria de negócios, mentoria empresarial, etc.

**Cliente precisa de educação** — O cliente não entende o valor do serviço ainda e precisa de educação rápida antes de comprar.

**Autoridade imediata com público frio** — Parcerias com associações, sindicatos, conselhos, câmaras de comércio, aceleradoras, empresas.

**Previsibilidade** — 1 palestra quinzenal = agenda cheia por 7-10 dias.

**Equipe pequena** — A palestra faz o "1:muitos" com o mesmo esforço do "1:1".

**Compliance ético** — Gerar demanda ensinando, sem prometer resultados (essencial para OAB e outros conselhos profissionais).

**Exemplos por setor:**
- Lei nova impactando setor → Empresários → Raio-X de conformidade
- Multas/autuações em alta → Diretores → Diagnóstico de riscos
- Associações pedindo benefícios → Diretoria → Triagens gratuitas
- Clínicas de saúde + LGPD → Gestores → Mapa LGPD
- E-commerce + chargebacks → Heads → Revisão de políticas
- Startups pré-captação → Founders → Due diligence express
- Condomínios + passivos trabalhistas → Síndicos → Auditoria de contratos`,tips:["Para negócios de serviços além do jurídico: troque 'diagnóstico jurídico' por 'diagnóstico estratégico' do seu nicho","Quanto mais caro o problema, melhor funciona o FPSI","Se o seu público está concentrado em associações ou comunidades, o FPSI é perfeito","Funciona para contadores, consultores, coaches, agências, arquitetos, engenheiros e mais"]}]},{id:"implementacao",title:"Implementação",description:"Roteiro de 14 dias para rodar sua primeira palestra",icon:"calendar",cards:[{title:"Dias 1-3: Pesquisa, Tema e Oferta",subtitle:"Fundação estratégica do funil",level:"iniciante",icon:"search",content:`**Dia 1 — Pesquisa e Posicionamento**

Defina **um público** e **um problema caro** que você resolve. Não tente abranger todo mundo.

Resultado: Declaração de posicionamento em 1 frase.

**Dia 2 — Tema e Promessa**

Crie o título e subtítulo da palestra com **benefício mensurável**.

Use o modelo: *"Em [tempo curto], como [público] consegue [resultado mensurável] SEM [obstáculo caro]"*

Exemplo: "Em 7 dias, como lojistas de e-commerce eliminam chargebacks abusivos SEM paralisar as vendas."

Resultado: Título validado com 3 pessoas do público-alvo.

**Dia 3 — Arquitetura da Oferta**

Monte a estrutura de oferta em 3 camadas:

- **Oferta de entrada:** diagnóstico/triagem gratuita ou simbólica
- **Oferta principal:** solução jurídica ou de serviço principal
- **Garantia/segurança:** enquadramento ético, LGPD, termos de engajamento

Resultado: Documento de oferta (1 página).`,checklist:[{title:"Checklist dos Dias 1-3",items:["Definir público específico (nicho + porte + dor)","Mapear o problema caro que resolvo","Escrever declaração de posicionamento em 1 frase","Criar título da palestra com benefício mensurável","Validar título com 3 pessoas do público-alvo","Desenhar oferta de entrada (Raio-X/diagnóstico)","Desenhar oferta principal","Definir garantia/segurança ética","Produzir documento de oferta (1 página)"]}],tips:["Teste seu título com pessoas reais antes de produzir qualquer material","A oferta de entrada deve ser irresistível: zero risco para o lead, alto valor percebido","Se atua em mais de um nicho, comece pelo que tem mais dor e mais acesso ao público"]},{title:"Dias 4-7: Ativos, Roteiro, Automação e Captação",subtitle:"Construção dos materiais e início da divulgação",level:"intermediario",icon:"wrench",content:`**Dia 4 — Ativos Mínimos Viáveis**

Monte os assets essenciais:
- **Landing Page** com: promessa, data/horário, "Para quem é/não é", 3-5 ganhos, mini bio, prova social ética, formulário com consentimento LGPD, link para WhatsApp
- **Formulário** com qualificação leve (3-5 perguntas)
- **Grupo WhatsApp** silencioso para avisos
- **Calendário online** para agendamentos

Resultado: Link público testado em celular.

**Dia 5 — Roteiro da Palestra**

Estruture em 7 blocos + 3 estudos de caso.

Resultado: Slides rascunho.

**Dia 6 — Automação Leve**

Configure sequências de pré-evento (WhatsApp + e-mail) e pós-evento.

Resultado: Mensagens prontas e disparos testados.

**Dia 7 — Captação**

Ative os 3 canais:
- **Orgânico:** posts, stories, lista de transmissão, e-mails
- **Parcerias:** sindicatos, associações, comunidades, empresas
- **Pago:** R$50-200/dia por 5-7 dias, foco em Leads

Resultado: 100-300 inscrições alvo.`,checklist:[{title:"Checklist dos Dias 4-7",items:["Landing Page no ar e testada em celular","Formulário com qualificação leve configurado","Grupo WhatsApp silencioso criado","Calendário online configurado","Roteiro da palestra em 7 blocos","3 estudos de caso selecionados","Slides rascunho prontos","Sequência de pré-evento WhatsApp configurada","Sequência de pós-evento configurada","Posts orgânicos publicados (mínimo 3 variações)","Kit parceiro enviado (texto + arte + link UTM)","Campanha paga ativada (se aplicável)"]}],tips:["O custo de referência por inscrição é R$8-20 via pago (varia por nicho)","Dê kit parceiro pronto: texto, arte e link UTM para medir resultados","LP simples > LP perfeita. Não trave aqui. Foque na promessa e no formulário","Para serviços não-jurídicos: substitua 'prova social ética' por cases e métricas"]},{title:"Dias 8-14: Aquecimento, Entrega e Pós-evento",subtitle:"Execução da palestra e colheita dos resultados",level:"intermediario",icon:"play",content:`**Dia 8 — Aquecimento**
Envie conteúdos de preparo: checklist, quiz, vídeo curto (3-5 min).
Meta: taxa de abertura > 60% no WhatsApp.

**Dia 9 — Ensaio Técnico**
Teste plataforma, áudio, câmera, CTA e links.
Resultado: checklist 100% ok.

**Dia 10 — A Palestra**
Entrega de alto valor + CTA sem fricção.
Meta: agendamentos ao vivo ≥ 10% dos presentes.

**Dia 11-12 — Follow-up**
5 toques multicanais (WhatsApp, e-mail, ligação curta).
Meta: dobrar agendamentos.

**Dia 13 — Reuniões de Diagnóstico**
Script consultivo em 30-45 min. Ofereça 2 caminhos: Básico e Completo.
Meta: propostas enviadas no mesmo dia.

**Dia 14 — Fechamentos e Retrospectiva**
Feche contratos + colete NPS + ajuste o funil.
Resultado: Playbook Versão 1 pronto para repetir quinzenalmente.`,checklist:[{title:"Checklist dos Dias 8-14",items:["Enviar checklist/quiz T-48h","Enviar insight (áudio/vídeo) T-24h","Enviar link + reforço T-2h e T-10min","Ensaio técnico completo (100% ok)","Palestra entregue com CTA ativo","Agendamentos ao vivo capturados","Follow-up T+1h: agradecimento + link agenda","Follow-up T+24h: highlights + case curto","Follow-up T+48h: objeção comum + agenda","Follow-up T+72h: bônus expira","Follow-up T+96h: última chamada elegante","Reuniões de diagnóstico realizadas","Propostas enviadas no mesmo dia","NPS coletado","Playbook V1 documentado"]}],tips:["O aquecimento é o que garante show-up. Sem ele, metade não aparece","No ensaio, teste TUDO: do link de entrada ao QR code do CTA","Após a palestra, velocidade é tudo: o lead esfria rápido"]},{title:"Modo Sprint 72h",subtitle:"Para quem precisa rodar rápido",level:"avancado",icon:"zap",content:`Se você não tem 14 dias, use o **Modo Sprint** condensado:

**D0 Manhã:**
- Escolher público, tema e promessa
- Montar LP simples (pode ser até Google Forms + link WhatsApp)

**D0 Tarde:**
- Captação orgânica intensa: posts, stories, lista de transmissão, DMs
- Acionar parcerias que já tem (associações, colegas, comunidades)
- Preparar roteiro curto (30 min de palestra)

**D1:**
- Aquecimento (enviar checklist/lembrete)
- Ensaio rápido (15 min)
- À noite: palestrar

**D2:**
- Follow-up agressivo logo cedo
- Agendar e realizar reuniões de diagnóstico
- Enviar propostas

**O Sprint é ideal para:**
- Testar um novo nicho antes de investir em ativos completos
- Aproveitar um evento/oportunidade de última hora
- Validar tema e promessa com público real
- Gerar primeiros resultados para construir o playbook completo`,tips:["O Sprint aceita imperfeição — a execução vale mais que a produção perfeita","Use ferramentas simples: Google Forms, WhatsApp e Google Meet bastam","Se funcionar no Sprint, o roteiro de 14 dias vai potencializar muito mais","Documente tudo que fez para poder replicar e melhorar"]}]},{id:"palestra",title:"A Palestra",description:"Estrutura, roteiro e técnicas de entrega de alto impacto",icon:"mic",cards:[{title:"Arquitetura em 7 Blocos",subtitle:"A estrutura que maximiza conversão sem ser vendedora",level:"intermediario",icon:"layers",content:`A palestra segue uma estrutura de **7 blocos** desenhada para educar, qualificar e converter:

**Bloco 1 — Abertura (2-4 min)**
Gancho de impacto, autoridade rápida, empatia com a dor, agenda da palestra.
Script: "Pessoal, obrigado por estarem aqui. Em 45 minutos, você sai com um plano de ação para [resultado] SEM [obstáculo]."

**Bloco 2 — Mapa do Risco/Oportunidade (6-10 min)**
Dados rápidos, impacto financeiro. Mostre o custo de NÃO agir.
Script: "De cada R$100 que saem do caixa, R$[X] estão indo embora por [causa]."

**Bloco 3 — Diagnóstico Guiado (10-12 min)**
Checklist ou quiz ao vivo. A audiência calcula seu próprio score.
Script: "Abra o checklist no link/QR. Marque 0 ou 1 para cada item. Some o seu score."

**Bloco 4 — Plano de 3 Passos (12-15 min)**
O que implementar amanhã: Mapear → Priorizar → Executar.

**Bloco 5 — Provas Inteligentes (6-8 min)**
Estudos de caso com a estrutura: contexto → ação → resultado em [tempo].

**Bloco 6 — Oferta de Próximo Passo (4-6 min)**
Diagnóstico/triagem com redução de risco.
Script: "Se você quer um plano customizado, vou abrir [X] vagas de Raio-X sem custo."

**Bloco 7 — Q&A Estratégico (8-12 min)**
Selecione dúvidas que reforçam valor e destravam decisão.

**Duração total sugerida:** 45-60 min.
**Regra de ouro:** a cada 7-10 min, um micro convite à ação.`,tips:["O Bloco 3 (Diagnóstico Guiado) é o mais poderoso: faz a audiência sentir a dor na própria pele","Nunca pule o Q&A — é onde as objeções reais aparecem e você pode quebrá-las ao vivo","Micro CTAs ao longo da palestra ('digite EU no chat') mantêm engajamento alto","Adapte a linguagem: para negócios de serviços, troque jargão jurídico por linguagem empresarial"]},{title:"Roteiro Completo (Script Slide a Slide)",subtitle:"O que falar em cada slide da apresentação",level:"intermediario",icon:"scroll-text",content:`**Slide 1 — Abertura**
"Pessoal, obrigado por estarem aqui. Em 45 minutos, você sai com um plano de ação para [resultado] SEM [obstáculo]."

**Slide 2 — Quem sou e por que isso importa**
"Sou [nome], [especialidade]. Já ajudei [perfil] a [resultado]. Meu foco é: clareza, rapidez e segurança."

**Slide 3 — Custo do problema**
"De cada R$100 que saem do caixa, R$[X] estão indo embora por [causa]." + gráfico simples de impacto

**Slide 4 — Diagnóstico guiado**
"Abra o checklist no link/QR. Marque 0/1 para cada item. Some o seu score." (2-3 min interativo)

**Slide 5 — Plano de 3 passos**
1. Mapear (o que medir, onde buscar dados)
2. Priorizar (critérios e prazos)
3. Executar (responsáveis e checkpoints)

**Slide 6 — Estudos de caso**
"Caso A: contexto → ação → resultado em [tempo]" (evidência objetiva)

**Slide 7 — Convite para o Raio-X**
"Se você quer um plano customizado para a sua realidade, vou abrir [X] vagas de Raio-X sem custo. Link no chat/QR."

**Slide 8 — Q&A estratégico**
Selecione dúvidas que reforçam valor e destravam decisão.

**Slide 9 — Encerramento**
Resumo em 3 bullets + convite final + onde baixar materiais.`,tips:["Pratique o script em voz alta pelo menos 2 vezes antes da palestra","Cada slide deve ter no máximo 1 ideia central","Use fontes grandes e pouco texto nos slides — você é o show, não o PowerPoint","Tenha QR codes prontos em múltiplos slides, não apenas no final"]},{title:"CTA Sem Fricção (Ao Vivo)",subtitle:"Como converter sem parecer vendedor",level:"avancado",icon:"target",content:`O CTA ao vivo precisa ser **natural, fácil e sem fricção**:

**Botões e links ativos**
Coloque no chat E nos slides (QR code). O lead não pode ter que "procurar" como agendar.

**Janela de agendamento**
Aberta por 15 min ao final. Crie senso de oportunidade (não escassez artificial).

**Oferta de decisão rápida**
72h com bônus concreto: modelos, treinamento curto do time, canal de dúvidas.

**Anotação pública de vagas**
"Faltam 3 vagas" — só se for verdade. Sem escassez artificial.

**Oferta de entrada ideal:**
- Nome: Raio-X [do seu nicho] (diagnóstico de 30-45 min)
- Entrega: identificação de riscos, priorização, roteiro de 30 dias
- Preço: gratuito ou simbólico (R$97-297) para filtrar curiosos
- Garantia: "Se não gerar clareza prática, envio o checklist premium gratuitamente"

**Oferta principal (após o diagnóstico):**
- Solução core com escopo claro, cronograma, marcos e termos
- Bônus de decisão rápida (72h): modelos, treinamento, canal VIP`,tips:["O CTA deve ser repetido pelo menos 3 vezes durante a palestra","Use micro CTAs antes do CTA principal: 'digite EU no chat se se identificou'","Nunca pressione. A palestra educativa gera demanda naturalmente","Para serviços de negócios: troque 'Raio-X Jurídico' por 'Raio-X Estratégico'"]},{title:"Design de Slides Funcional",subtitle:"Princípios de Visual Design para apresentações que convertem",level:"intermediario",icon:"palette",content:`Slides devem ser **funcionais**, não decorativos:

**Regras fundamentais:**
- Letras grandes, pouco texto, 1 ideia por slide
- Gráficos simples de antes/depois e passo a passo
- QR code da agenda visível em múltiplos slides
- Contraste alto: fundo escuro + texto claro ou vice-versa

**Estrutura visual por bloco:**
- Abertura: foto sua + título impactante
- Custo do problema: gráfico simples (barra ou pizza)
- Diagnóstico: QR code gigante + instruções em 3 bullets
- Plano de 3 passos: ícones numerados grandes
- Casos: antes/depois com números
- CTA: link + QR + "escaneie agora"

**Erros comuns:**
- Slides lotados de texto (ninguém lê)
- Animações excessivas (distraem)
- Logo em todos os slides (poluição visual)
- Gráficos complexos que ninguém entende em 5 segundos`,tips:["Teste seus slides em um celular: se não dá pra ler, simplifique","O slide do CTA deve ser o mais limpo de todos: só o QR e uma frase","Use no máximo 3 cores em toda a apresentação","Prefira fotos reais a ilustrações genéricas de banco de imagem"]}]},{id:"captacao-aquecimento",title:"Captação e Aquecimento",description:"Como atrair, inscrever e preparar sua audiência",icon:"megaphone",cards:[{title:"3 Canais de Captação Que Somam",subtitle:"Orgânico + parcerias + pago = inscrições suficientes",level:"intermediario",icon:"trending-up",content:`**1. Orgânico Inteligente**
- Post de anúncio (3 variações de copy/imagem)
- Stories com countdown e bastidores
- Lista de transmissão e DMs personalizados
- E-mails curtos para base existente
- Live/short 48h antes com mini-conteúdo e CTA para a palestra

**2. Parcerias e Canais**
- Associações, sindicatos, condomínios, câmaras de comércio
- Empresas parceiras, influenciadores nichados
- Aceleradoras, hubs de inovação, coworkings
- Kit parceiro pronto: texto, arte e link UTM para medir

**3. Pago Enxuto**
- Campanhas de R$50-200/dia por 5-7 dias
- Foco em **Leads** (não engajamento)
- 2 criativos: problema caro + promessa concreta
- Métrica de referência: custo por inscrição ≤ R$8-20 (varia por nicho)

**Meta de inscrições:** 100-300 por evento (para ter 40-130 presentes).`,tips:["O orgânico sozinho pode bastar se você tem base: liste, stories e DMs convertem bem","Parcerias são o canal com melhor custo-benefício a médio prazo","No pago, comece com R$50/dia e escale se o CPL estiver abaixo de R$15","Para qualquer negócio de serviços: adapte as parcerias ao seu setor (clínicas, contadores, etc.)"]},{title:"Landing Page: Estrutura Mínima",subtitle:"Os 7 blocos essenciais da LP de inscrição",level:"intermediario",icon:"layout",content:`Sua Landing Page precisa de **7 blocos obrigatórios**:

**1. Cabeçalho**
Promessa, data/horário, botão "Quero minha vaga".

**2. Para quem é / não é**
Listagem prática e objetiva. Isso qualifica e atrai o público certo.

**3. O que você vai levar**
3-5 ganhos aplicáveis e concretos.

**4. Quem conduz**
Mini bio com autoridade e diferencial. Foco em resultados, não em currículo.

**5. Prova social ética**
Cases/indicadores sem depoimentos que infrinjam normas. Para advogados: fatos e processos, sem resultados garantidos.

**6. Formulário**
Nome, e-mail, WhatsApp com consentimento LGPD.
Qualificação leve: 3-5 perguntas (porte do negócio, problemas atuais, urgência).
Tag automática: quente/morno/frio.

**7. Confirmação**
Link para entrar no grupo/lista WhatsApp + mensagem de boas-vindas.

**Modelo de texto LGPD:**
"Autorizo o uso dos meus dados para fins de inscrição, envios de lembretes e materiais desta palestra e conteúdos relacionados. Posso solicitar exclusão a qualquer momento."`,tips:["LP simples e funcional > LP bonita e complicada","Teste no celular antes de publicar — 80%+ do tráfego vem de mobile","O formulário deve ter no máximo 5 campos — cada campo extra reduz conversão","Ferramentas simples funcionam: Carrd, Google Forms, ou qualquer builder"]},{title:"Aquecimento Pré-Evento: 3 Toques Obrigatórios",subtitle:"A sequência que garante show-up acima de 40%",level:"intermediario",icon:"mail",content:`**O aquecimento define seu show-up.** Sem ele, espere 20-30% de presença. Com ele, 40-60%.

**T-48h — "Você está dentro"**
Mensagem de confirmação + PDF/Checklist prático (2 páginas).
Script: "Nome, confirmado para [data] às [hora]. Leve este checklist 3 passos para mapear seus riscos: [link]. Até lá!"

**T-24h — Lembrete + Insight**
Lembrete com 1 insight valioso (áudio ou vídeo de 60-90s).
Script: "Hoje às [hora]! Vou mostrar como [resultado] SEM [obstáculo]. Link: [link]. Deixe pronto papel e caneta."

**T-2h e T-10min — Link + Benefício + QR**
Último reforço com link direto e QR da agenda.
Script: "Durante a palestra vou abrir [X] vagas para um Raio-X gratuito. Garanta sua presença ao vivo para pegar o link."

**Canais:**
- WhatsApp (grupo ou lista de transmissão)
- E-mail (para quem deixou)
- SMS (opcional, para leads quentes)`,tips:["O PDF/checklist pré-evento é poderoso: cria compromisso e antecipa valor","Áudio de 60s no WhatsApp tem taxa de escuta altíssima — use-o no T-24h","A mensagem T-10min é a mais importante: muita gente decide na última hora","Personalize com o nome sempre que possível"]}]},{id:"pos-evento",title:"Pós-Evento",description:"Follow-up, diagnóstico e conversão em contratos",icon:"handshake",cards:[{title:"Follow-up: 5 Toques em 4 Dias",subtitle:"A cadência que dobra seus agendamentos",level:"intermediario",icon:"repeat",content:`Após a palestra, **velocidade é tudo**. A cadência de follow-up é:

**T+1h — Agradecimento**
Mensagem de obrigado + link da agenda de diagnóstico.

**T+24h — Highlights**
3 prints dos slides mais úteis + case curto complementar.

**T+48h — Objeção Comum**
Áudio de 90s quebrando a objeção mais frequente + link da agenda.

**T+72h — Bônus Expira**
Lembrete objetivo de que o bônus de decisão rápida encerra.

**T+96h — Última Chamada Elegante**
Mensagem de encerramento sem pressão indevida.

**Script de ligação curta (2-3 min):**
"Oi, Nome! Vi que você [participou/se inscreveu]. Em 30 segundos: quer que eu te ajude a transformar o seu checklist em um plano de 30 dias? Se sim, te mando o link de agenda agora."

**Meta:** Dobrar os agendamentos que vieram ao vivo com o follow-up.`,tips:["O T+1h é o mais importante: o lead ainda está quente","Highlights com prints dos slides funcionam melhor que texto corrido","A ligação curta no T+48h converte muito, especialmente para leads quentes","Nunca seja insistente ou desrespeitoso — elegância fecha mais que pressão"]},{title:"Reunião de Diagnóstico (30-45 min)",subtitle:"O script consultivo que gera propostas no mesmo dia",level:"avancado",icon:"user-check",content:`A reunião de diagnóstico segue uma estrutura consultiva em **4 blocos**:

**1. Contexto e Objetivo (5 min)**
Entenda a situação atual e as metas do lead.

**2. Radiografia (10-15 min)**
Faça perguntas de alto impacto e colete evidências.

**3. Plano e Proposta (10-15 min)**
Apresente 2 caminhos: Básico e Completo.

**4. Encaminhamentos (5 min)**
Documentos necessários, prazos, próxima reunião.

**Perguntas âncora (use ao menos 2):**
- "O que te custa manter [problema] como está por 90 dias?"
- "O que muda se resolvermos isso em 30 dias?"
- "Quem decide? Quem executa? Que restrições temos?"

**Fechamento elegante:**
"Pelo que mapeamos, recomendo [solução]. Investimento de R$[X]. Se avançarmos hoje, incluo [bônus]. Faz sentido começarmos?"

**Pós-reunião:**
- Envie proposta no mesmo dia (quanto mais rápido, melhor)
- Inclua resumo do que foi discutido
- Deixe claro próximos passos e prazos`,tips:["A pergunta 'O que te custa manter o problema?' é a mais poderosa — use sempre","2 opções (Básico/Completo) converte melhor que 1 opção ou 3+","Enviar proposta no mesmo dia é não-negociável: o timing é tudo","Para serviços de negócios: adapte as perguntas âncora para o contexto empresarial"]},{title:"Métricas, Metas e Fórmulas",subtitle:"Os KPIs que você precisa acompanhar desde o dia 1",level:"avancado",icon:"bar-chart",content:`**KPIs Essenciais:**

- **Show-up (%)** = Presentes ÷ Inscritos × 100 — Meta iniciante: 30-45%
- **Agendamentos (%)** = Agendamentos ÷ Presentes × 100 — Meta: 10-20% ao vivo
- **Conversão em contrato (%)** = Contratos ÷ Reuniões × 100 — Meta: 25-40%

**Fórmulas de Negócio:**
- **Receita por palestra** = Contratos × Ticket Médio
- **CAC** = Investimento em mídia ÷ Contratos
- **ROI do evento** = (Receita - Custos) ÷ Custos do evento

**Exemplo prático (cenário conservador):**
- 200 inscritos → 80 presentes (40% show-up)
- 80 presentes → 12 agendamentos (15%)
- 12 reuniões → 4 contratos (33%)
- 4 contratos × R$5.000 ticket = R$20.000 por palestra
- Investimento: R$1.000 (mídia) + R$500 (operação) = R$1.500
- ROI: 1.233%

**Se rodar quinzenalmente:** R$40.000/mês com 2 palestras.`,tips:["Comece medindo apenas 3 coisas: inscritos, presentes, agendamentos","Monte uma planilha simples e preencha após cada evento","O ROI do funil de palestra tende a melhorar a cada rodada — documente tudo","Compare seu CAC com outros canais: você vai ver que palestra é imbatível"]},{title:"LGPD e Ética: Sem Dor de Cabeça",subtitle:"Compliance que protege você e seus leads",level:"intermediario",icon:"shield",content:`**Checklist de compliance:**

**Consentimento**
Obtenha consentimento explícito na LP e no WhatsApp com texto claro sobre o uso dos dados.

**Finalidade Específica**
Especifique: inscrição, envio de materiais, agendamento de diagnósticos.

**Opt-out Simples**
"Responda SAIR a qualquer momento" — e respeite.

**Retenção de Dados**
Defina prazo: exclua dados de inativos após [X] meses.

**Publicidade e Conselhos Profissionais**
- Para advogados (OAB): evite promessas de resultado garantido e depoimentos que violem normas. Foque em fatos e processos.
- Para outros profissionais: siga as regras do seu conselho de classe.
- Para negócios em geral: use provas sociais éticas baseadas em métricas e indicadores.

**Modelo de consentimento universal:**
"Autorizo o uso dos meus dados para fins de inscrição, envios de lembretes e materiais deste evento e conteúdos relacionados. Posso solicitar exclusão a qualquer momento conforme a LGPD."`,tips:["Consentimento LGPD não é burocracia — é profissionalismo e diferencial competitivo","Tenha um processo claro de exclusão de dados: cria confiança","Documente todos os consentimentos coletados (planilha simples basta)","Para palestras online: inclua o termo de consentimento no formulário de inscrição"]}]},{id:"escala",title:"Escala e Operação",description:"Transforme o FPSI em uma operação previsível e escalável",icon:"trending-up",cards:[{title:"Rotina Operacional e Papéis",subtitle:"Quem faz o quê para rodar o funil quinzenalmente",level:"avancado",icon:"users",content:`**Papéis essenciais:**

**Você (profissional principal)**
Conteúdo, diagnóstico, proposta. Seu tempo vai para onde gera mais valor.

**Assistente / Operação**
LP, grupos, mensagens, agenda, follow-up. Pode ser uma pessoa ou ferramentas automatizadas.

**Tráfego (opcional)**
Campanhas pagas e relatórios de desempenho.

**Suporte técnico**
Plataforma de live, gravações, links. Pode ser terceirizado.

**Ritual Semanal (90 min):**
1. Métricas do último evento (15 min)
2. Ajustes de copy/LP (20 min)
3. Agendas e follow-ups pendentes (20 min)
4. Parcerias e captação (20 min)
5. Pautas de conteúdo (15 min)

**A regra é:** você foca no que só você pode fazer (conteúdo + diagnóstico + proposta). Todo o resto é delegável ou automatizável.`,tips:["Mesmo sozinho, faça o ritual semanal de 90 min — é o que torna o processo previsível","Um assistente virtual de 4h/semana já dá conta do operacional básico","Automatize o máximo possível: disparos, agendamento, confirmações","Documente cada processo em um SOP simples (1 página por processo)"]},{title:"Próximo Nível: Escala Total",subtitle:"De 1 palestra para uma máquina de crescimento",level:"expert",icon:"sparkles",content:`Depois de validar o sistema básico, escale com:

**Calendário editorial mensal**
2 palestras/mês + 1 workshop fechado para parceiros. Cada palestra com tema diferente, rotacionando 3 dores principais.

**Biblioteca de temas**
Crie 3-5 roteiros para nichos diferentes que podem ser rotacionados. Cada tema já tem LP, slides e scripts prontos.

**Operação em playbooks**
Cada nicho com variações de slides, LP e scripts. Um assistente consegue rodar o funil com playbook.

**Integrações tecnológicas**
CRM (Pipeline), planilha de métricas automática, agendamento com lembretes, automação de follow-up.

**Assinatura B2B**
Ofertas recorrentes para grupos/associações com pauta anual. Ex: 12 palestras/ano para uma associação cobrando fee mensal.

**Multicanal**
Aproveite o conteúdo da palestra para gerar: cortes para Reels/Shorts, posts de carrossel, newsletter, artigos, podcasts.

**A visão final:** Um ecossistema onde a palestra alimenta todos os outros canais e cada canal alimenta a próxima palestra.`,tips:["Comece a escalar só depois de ter pelo menos 3 palestras bem-sucedidas","A assinatura B2B é o modelo mais lucrativo a longo prazo","Gravar cada palestra gera acervo de conteúdo para 6+ meses","Para negócios de serviços: combine palestras abertas com workshops fechados in-company"]},{title:"Adaptação para Negócios de Serviços",subtitle:"Como usar o FPSI fora do jurídico",level:"intermediario",icon:"briefcase",content:`O FPSI foi criado para advogados, mas se aplica a **qualquer negócio de serviços consultivos**:

**Consultores de negócios / Gestão:**
- Tema: "Como reduzir custos operacionais em 30 dias sem demitir"
